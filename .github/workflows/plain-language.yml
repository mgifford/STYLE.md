name: Plain Language Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plain-language:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Check plain language
        run: |
          npx --yes write-good \
            README.md STYLES.md STYLES-template.md \
            ACCESSIBILITY.md SUSTAINABILITY.md AGENTS.md \
            templates/**/*.md examples/**/*.md

      - name: Check banned jargon terms
        run: |
          set -e
          files=$(find . -type f -name "*.md" -not -path "./.git/*")
          while IFS= read -r term; do
            if [ -n "$term" ] && grep -RIn --exclude-dir=.git --include='*.md' -E "\\b${term}\\b" .; then
              echo "Found discouraged term: $term"
              exit 1
            fi
          done < .github/plain-language-terms.txt
